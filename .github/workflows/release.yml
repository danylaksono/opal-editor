name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v1.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare GitHub release
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate notes from the changelog
        run: node scripts/release-notes.mjs "$RELEASE_TAG" > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; keeping its existing notes."
            exit 0
          fi

          prerelease_args=()
          case "$RELEASE_TAG" in
            *-alpha*|*-beta*|*-rc*) prerelease_args+=(--prerelease) ;;
          esac

          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --title "TectonicEditor $RELEASE_TAG" \
            --notes-file release-notes.md \
            "${prerelease_args[@]}"

  publish:
    name: ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-22.04
            rust-target: ""
            tauri-args: ""

          - name: macOS-ARM64
            os: macos-15
            rust-target: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin"

          - name: macOS-x86_64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            tauri-args: "--target x86_64-apple-darwin"

          - name: Windows-x86_64
            os: windows-latest
            rust-target: ""
            tauri-args: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev \
            libicu-dev libgraphite2-dev libharfbuzz-dev \
            libfreetype-dev libfontconfig-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install icu4c harfbuzz pkg-config
          harfbuzz_prefix="$(brew --prefix harfbuzz)"
          echo "PKG_CONFIG_PATH=$(brew --prefix icu4c)/lib/pkgconfig:$harfbuzz_prefix/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "CFLAGS=-I$harfbuzz_prefix/include" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-std=c++17 -I$harfbuzz_prefix/include" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          vcpkg integrate install
          vcpkg install harfbuzz[graphite2] freetype icu fontconfig --triplet x64-windows-static-md
          echo "TECTONIC_DEP_BACKEND=vcpkg" >> "$env:GITHUB_ENV"
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> "$env:GITHUB_ENV"
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static-md" >> "$env:GITHUB_ENV"
          echo "VCPKGRS_TRIPLET=x64-windows-static-md" >> "$env:GITHUB_ENV"
          echo "CXXFLAGS=/std:c++17" >> "$env:GITHUB_ENV"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "TectonicEditor ${{ env.RELEASE_TAG }}"
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc') || contains(env.RELEASE_TAG, '-beta') || contains(env.RELEASE_TAG, '-alpha') }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.tauri-args }}
